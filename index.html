<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive App</title>
<style>
body{margin:0;font-family:Arial;background:#121212;color:white;}
#splash{position:fixed;width:100%;height:100%;display:flex;justify-content:center;align-items:center;flex-direction:column;background:#121212;}
.loader{width:40px;height:40px;border:4px solid #333;border-top:4px solid #4CAF50;border-radius:50%;animation:spin 1s linear infinite;margin-top:10px;}
@keyframes spin{100%{transform:rotate(360deg);}}
.box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e1e;padding:30px;border-radius:15px;width:300px;text-align:center;}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;}
input{background:#2a2a2a;color:white;}
button{background:#4CAF50;color:white;}
</style>
</head>
<body>

<div id="splash">
<h1>📂 Drive App</h1>
<div class="loader"></div>
</div>

<div class="box">
<h2>Login</h2>
<form onsubmit="login(event)">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="pw" placeholder="Password" required>
<button type="submit">Masuk</button>
</form>
<p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

setTimeout(()=>{document.getElementById("splash").style.display="none";},1500);

window.login = function(e){
e.preventDefault();
msg.innerText="Loading...";
signInWithEmailAndPassword(auth,email.value,pw.value)
.then(()=>location.href="menu.html")
.catch(()=>msg.innerText="Login gagal!");
}
</script>

</body>
</html>
