<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>EKO Drive Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📁 EKO Drive Manager</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button id="loginBtn">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <button id="logoutBtn">Logout</button>

  <div id="folders">
    <button data-id="1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT">EKO PRO</button>
    <button data-id="18ASYGXvMTqU2uw57xHF5JZZbLTSvKQTg">EKO 36</button>
  </div>

  <button id="backBtn" style="display:none;">⬅️ Back</button>

  <div id="fileGrid"></div>
</div>

<!-- VIEWER -->
<div id="viewer" style="display:none;">
  <button id="closeViewer">❌ Tutup</button>
  <iframe id="viewerFrame" width="100%" height="500"></iframe>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
