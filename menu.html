<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive App</title>

<style>
body{margin:0;font-family:Arial;background:#121212;color:white;}

.topbar{
  padding:10px;
  background:#1f1f1f;
  display:flex;
  justify-content:space-between;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  padding:15px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.viewer.active{display:flex;}

.viewer iframe{
  flex:1;
  border:none;
}

.viewer img{
  max-width:90%;
  margin:auto;
}

</style>
</head>

<body>

<div class="topbar">
<b>Drive App</b>
<button onclick="back()">⬅️</button>
</div>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">
<button onclick="closeViewer()">❌</button>
<div id="preview"></div>
</div>

<script>

/* 🔥 DATA FILE (SIMULASI DRIVE) */
const data = {
  root: [
    {type:"folder", name:"EKO PRO", id:"eko_pro"},
    {type:"folder", name:"EKO 36", id:"eko_36"},
    {type:"folder", name:"EKO 03", id:"eko_03"},
  ],

  eko_pro: [
    {type:"image", name:"Foto 1", url:"https://picsum.photos/500"},
    {type:"pdf", name:"File PDF", url:"https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"}
  ],

  eko_36: [
    {type:"image", name:"Gambar", url:"https://picsum.photos/600"}
  ],

  eko_03: []
};

let current = "root";

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data[current].forEach(item=>{
    const div = document.createElement("div");
    div.className = "card";

    if(item.type==="folder"){
      div.innerHTML = "📁<br>"+item.name;
      div.onclick = ()=>{
        current = item.id;
        render();
      };
    }

    if(item.type==="image"){
      div.innerHTML = "🖼️<br>"+item.name;
      div.onclick = ()=>openImage(item.url);
    }

    if(item.type==="pdf"){
      div.innerHTML = "📄<br>"+item.name;
      div.onclick = ()=>openPDF(item.url);
    }

    grid.appendChild(div);
  });
}

/* BACK */
function back(){
  current="root";
  render();
}

/* IMAGE */
function openImage(url){
  const viewer = document.getElementById("viewer");
  const preview = document.getElementById("preview");

  preview.innerHTML = `<img src="${url}">`;
  viewer.classList.add("active");
}

/* PDF */
function openPDF(url){
  const viewer = document.getElementById("viewer");
  const preview = document.getElementById("preview");

  preview.innerHTML = `<iframe src="${url}"></iframe>`;
  viewer.classList.add("active");
}

/* CLOSE */
function closeViewer(){
  document.getElementById("viewer").classList.remove("active");
}

render();

</script>

</body>
</html>
