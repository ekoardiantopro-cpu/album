<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#1e1e1e;
  height:100vh;
  padding:15px;
}

.sidebar h2{
  font-size:18px;
}

.menu-item{
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.menu-item:hover{
  background:#2a2a2a;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  height:60px;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  padding:0 15px;
  justify-content:space-between;
}

.search{
  width:300px;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#2a2a2a;
  color:white;
}

/* GRID */
.grid{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.thumb{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}

.title{
  margin-top:8px;
  font-size:14px;
}

/* VIEWER */
.viewerPage{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#121212;
  display:none;
  flex-direction:column;
}

.viewerPage.active{
  display:flex;
}

.viewerTop{
  padding:10px;
  background:#1f1f1f;
}

iframe{
  flex:1;
  border:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>📂 Drive</h2>

<div class="menu-item">🏠 Home</div>
<div class="menu-item">⭐ Favorite</div>
<div class="menu-item">🕒 Recent</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<input class="search" placeholder="Cari file...">
<div id="user"></div>
</div>

<div class="grid" id="grid">

<!-- IMAGE -->
<div class="card" onclick="openFile('https://drive.google.com/uc?export=view&id=FILE_ID')">
<img class="thumb" src="https://drive.google.com/uc?export=view&id=FILE_ID">
<div class="title">Gambar</div>
</div>

<!-- PDF -->
<div class="card" onclick="openFile('https://drive.google.com/file/d/FILE_ID/preview')">
📄
<div class="title">PDF File</div>
</div>

<!-- FOLDER -->
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT')">
📁
<div class="title">EKO PRO</div>
</div>

</div>

</div>

<!-- VIEWER -->
<div class="viewerPage" id="viewerPage">

<div class="viewerTop">
<button onclick="closeViewer()">⬅️ Kembali</button>
</div>

<iframe id="viewer"></iframe>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* USER */
onAuthStateChanged(auth,user=>{
if(!user) location.href="index.html";
else document.getElementById("user").innerText=user.email;
});

/* OPEN FILE */
window.openFile = function(url){
viewer.src = url;
viewerPage.classList.add("active");
}

/* CLOSE */
window.closeViewer = function(){
viewerPage.classList.remove("active");
}

/* FOLDER */
window.openFolder = function(url){
window.open(url,"_blank");
}
</script>

</body>
</html>
