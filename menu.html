<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

/* TOPBAR */
.topbar{
  height:60px;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

.search{
  width:200px;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#2a2a2a;
  color:white;
}

.user{
  font-size:12px;
  color:#aaa;
}

/* GRID */
.container{
  padding:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.hidden{
  display:none;
}

/* ICON / THUMB */
.icon{
  font-size:40px;
}

.thumb{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

/* VIEWER */
.viewerPage{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#121212;
  display:none;
  flex-direction:column;
}

.viewerPage.active{
  display:flex;
}

.viewerTop{
  padding:10px;
  background:#1f1f1f;
  display:flex;
  justify-content:space-between;
}

iframe{
  flex:1;
  border:none;
}

.btn{
  background:#4CAF50;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <input class="search" id="search" placeholder="Cari file...">
  <div class="user" id="user"></div>
</div>

<!-- GRID -->
<div class="container">
<div class="grid" id="grid">

<div class="card" data-name="eko pro" onclick="openFolder('https://drive.google.com/drive/folders/1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT')">
  <div class="icon">📁</div>
  <div>EKO PRO</div>
</div>

<div class="card" data-name="eko 36" onclick="openFolder('https://drive.google.com/drive/folders/18ASYGXvMTqU2uw57xHF5JZZbLTSvKQTg')">
  <div class="icon">📁</div>
  <div>EKO 36</div>
</div>

<div class="card" data-name="eko 03" onclick="openFolder('https://drive.google.com/drive/folders/1zXsXINns1ivJOoAnCggsfAjrnSYpUJGW')">
  <div class="icon">📁</div>
  <div>EKO 03</div>
</div>

<div class="card" data-name="cv prof" onclick="openFolder('https://drive.google.com/drive/folders/1K0SOBV82Lot5pPGTh5iRWBclcR0LMbqv')">
  <div class="icon">📁</div>
  <div>CV PROF</div>
</div>

<!-- IMAGE -->
<div class="card" data-name="gambar foto" onclick="openFile('https://drive.google.com/uc?export=view&id=FILE_ID')">
  <img class="thumb" src="https://drive.google.com/uc?export=view&id=FILE_ID">
  <div>Gambar</div>
</div>

<!-- PDF -->
<div class="card" data-name="pdf dokumen" onclick="openFile('https://drive.google.com/file/d/FILE_ID/preview')">
  <div class="icon">📄</div>
  <div>PDF</div>
</div>

</div>
</div>

<!-- VIEWER -->
<div class="viewerPage" id="viewerPage">
<div class="viewerTop">
  <button class="btn" onclick="closeViewer()">⬅️ Kembali</button>
  <button class="btn" onclick="logout()">Logout</button>
</div>
<iframe id="viewer"></iframe>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* USER */
onAuthStateChanged(auth,user=>{
  if(!user) location.href="index.html";
  else document.getElementById("user").innerText=user.email;
});

/* SEARCH FILTER */
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", function(){
  const value = this.value.toLowerCase();

  cards.forEach(card=>{
    const name = card.getAttribute("data-name");
    if(name.includes(value)){
      card.classList.remove("hidden");
    }else{
      card.classList.add("hidden");
    }
  });
});

/* FILE */
window.openFile = function(url){
  viewer.src = url;
  viewerPage.classList.add("active");
}

/* CLOSE */
window.closeViewer = function(){
  viewerPage.classList.remove("active");
}

/* FOLDER */
window.openFolder = function(url){
  window.open(url,"_blank");
}

/* LOGOUT */
window.logout = function(){
  signOut(auth).then(()=> location.href="index.html");
}
</script>

</body>
</html>
