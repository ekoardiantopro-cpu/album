<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive PRO</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

.topbar{
  height:60px;
  background:#1f1f1f;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  overflow:hidden;
}

.avatar img{width:100%;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.card:hover{background:#2a2a2a;}

.viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.viewer.active{display:flex;}

.viewerTop{
  background:#1f1f1f;
  padding:10px;
}

.viewer img,.viewer iframe{
  flex:1;
  width:100%;
  border:none;
}

.loginBox{
  display:flex;
  justify-content:center;
  margin-top:40px;
}

.loading{
  text-align:center;
  margin-top:50px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="left">
    <button onclick="goBack()">⬅️</button>
    <b>Drive PRO</b>
  </div>

  <div class="user" id="userBox" style="display:none;">
    <div class="avatar" id="avatar"></div>
    <div id="username"></div>
  </div>
</div>

<div class="loginBox" id="login"></div>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">
  <div class="viewerTop">
    <button onclick="closeViewer()">⬅️ Kembali</button>
  </div>
  <div id="preview"></div>
</div>

<script>
const CLIENT_ID = "112694935492-6hoanmgu4mimnvkons1s0a6rn3l0itrp.apps.googleusercontent.com";
const API_KEY = "AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A";

let tokenClient;
let accessToken = null;
let currentFolder = "root";
let historyStack = [];

/* INIT */
window.onload = () => {

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleLogin
  });

  google.accounts.id.renderButton(
    document.getElementById("login"),
    { theme: "outline", size: "large" }
  );

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/drive.readonly",
    callback: (resp) => {
      if(resp.error){
        alert("Login gagal: "+resp.error);
        return;
      }

      accessToken = resp.access_token;
      console.log("TOKEN:", accessToken);

      loadFolder("root");
    },
  });
};

/* LOGIN */
function handleLogin(response){
  const data = JSON.parse(atob(response.credential.split('.')[1]));

  document.getElementById("userBox").style.display = "flex";
  document.getElementById("username").innerText = data.name;
  document.getElementById("avatar").innerHTML =
    `<img src="${data.picture}">`;

  document.getElementById("login").style.display = "none";

  tokenClient.requestAccessToken();
}

/* LOAD FOLDER */
async function loadFolder(folderId){

  currentFolder = folderId;

  document.getElementById("grid").innerHTML =
    "<div class='loading'>⏳ Loading...</div>";

  let url = `https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents&key=${API_KEY}`;

  try{
    const res = await fetch(url,{
      headers:{
        Authorization: "Bearer "+accessToken
      }
    });

    const data = await res.json();

    console.log("FULL RESPONSE:", data); // 🔥 DEBUG

    if(data.error){
      document.getElementById("grid").innerHTML =
        "<div class='loading'>❌ ERROR: "+data.error.message+"</div>";
      return;
    }

    if(!data.files || data.files.length === 0){
      document.getElementById("grid").innerHTML =
        "<div class='loading'>📂 Tidak ada file di Drive</div>";
      return;
    }

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.files.forEach(file=>{
      const div = document.createElement("div");
      div.className = "card";

      if(file.mimeType === "application/vnd.google-apps.folder"){
        div.innerHTML = "📁<br>"+file.name;
        div.onclick = ()=>{
          historyStack.push(currentFolder);
          loadFolder(file.id);
        };
      }

      else if(file.mimeType.includes("image")){
        div.innerHTML = "🖼️<br>"+file.name;
        div.onclick = ()=> openImage(file.id);
      }

      else if(file.mimeType.includes("pdf")){
        div.innerHTML = "📄<br>"+file.name;
        div.onclick = ()=> openPDF(file.id);
      }

      else{
        div.innerHTML = "📄<br>"+file.name;
      }

      grid.appendChild(div);
    });

  }catch(err){
    document.getElementById("grid").innerHTML =
      "<div class='loading'>❌ Koneksi gagal</div>";
  }
}

/* PREVIEW */
function openImage(id){
  document.getElementById("viewer").classList.add("active");
  document.getElementById("preview").innerHTML =
  `<img src="https://drive.google.com/uc?id=${id}">`;
}

function openPDF(id){
  document.getElementById("viewer").classList.add("active");
  document.getElementById("preview").innerHTML =
  `<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
}

/* CLOSE */
function closeViewer(){
  document.getElementById("viewer").classList.remove("active");
}

/* BACK */
function goBack(){
  if(historyStack.length > 0){
    loadFolder(historyStack.pop());
  }
}
</script>

</body>
</html>
