<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Premium</title>

<style>
body{margin:0;font-family:Arial;background:#121212;color:white;}

.topbar{
  height:60px;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

.search{
  padding:8px;
  border-radius:8px;
  border:none;
  background:#2a2a2a;
  color:white;
}

.right{
  display:flex;
  align-items:center;
  gap:10px;
}

.theme-btn{
  cursor:pointer;
  padding:6px 10px;
  border-radius:8px;
  background:#2a2a2a;
}

/* PROFILE */
.profile{position:relative;}

.avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.dropdown{
  position:absolute;
  top:45px;
  right:0;
  background:#1e1e1e;
  border-radius:10px;
  padding:10px;
  width:200px;
  display:none;
}

.dropdown.show{display:block;}

/* GRID */
.container{padding:15px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

/* VIEWER */
.viewerPage{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.viewerPage.active{display:flex;}

.viewerTop{
  padding:10px;
  background:#1f1f1f;
}

.viewerPage iframe{
  flex:1;
  border:none;
}

/* GALLERY */
.gallery{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.gallery.active{display:flex;}

.gallery img{
  max-width:90%;
  max-height:90%;
}

/* LIGHT MODE */
body.light{background:#f5f5f5;color:#111;}
body.light .topbar{background:#fff;}
body.light .card{background:#fff;}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
<input class="search" id="search" placeholder="Cari file...">

<div class="right">
<span id="themeToggle" class="theme-btn">🌙</span>

<div class="profile">
<div class="avatar" id="avatar"></div>

<div class="dropdown" id="dropdown">
<div id="userEmail"></div>
<hr>
<div onclick="logout()">🚪 Logout</div>
</div>
</div>
</div>
</div>

<!-- GRID -->
<div class="container">
<div class="grid">

<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT')">📁 EKO PRO</div>
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/18ASYGXvMTqU2uw57xHF5JZZbLTSvKQTg')">📁 EKO 36</div>
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1zXsXINns1ivJOoAnCggsfAjrnSYpUJGW')">📁 EKO 03</div>
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1K0SOBV82Lot5pPGTh5iRWBclcR0LMbqv')">📁 CV PROF</div>

<div class="card" onclick="openImage('https://picsum.photos/800')">🖼️ Preview Image</div>

</div>
</div>

<!-- VIEWER -->
<div class="viewerPage" id="viewerPage">
<div class="viewerTop">
<button onclick="closeViewer()">⬅️ Kembali</button>
</div>
<iframe id="viewer"></iframe>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery" onclick="closeImage()">
<img id="imgView">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const avatar = document.getElementById("avatar");
const dropdown = document.getElementById("dropdown");
const userEmail = document.getElementById("userEmail");

/* ✅ CEK USER (TANPA AUTO LOGIN) */
onAuthStateChanged(auth, user=>{
  if(user){
    userEmail.innerText = user.email;

    if(user.photoURL){
      avatar.innerHTML = `<img src="${user.photoURL}">`;
    }else{
      avatar.innerHTML = user.email.charAt(0).toUpperCase();
    }

  }else{
    location.href = "index.html";
  }
});

/* DROPDOWN */
avatar.onclick = ()=> dropdown.classList.toggle("show");

/* LOGOUT FIX */
window.logout = ()=>{
  signOut(auth).then(()=>{
    location.href = "index.html";
  });
};

/* FOLDER EMBED */
window.openFolder = (url)=>{
  const id = url.split("/folders/")[1];
  const embed = `https://drive.google.com/embeddedfolderview?id=${id}#grid`;

  document.getElementById("viewerPage").classList.add("active");
  document.getElementById("viewer").src = embed;
};

window.closeViewer = ()=>{
  document.getElementById("viewerPage").classList.remove("active");
};

/* IMAGE */
window.openImage = (src)=>{
  document.getElementById("gallery").classList.add("active");
  document.getElementById("imgView").src = src;
};

window.closeImage = ()=>{
  document.getElementById("gallery").classList.remove("active");
};

/* THEME */
const toggle = document.getElementById("themeToggle");

toggle.onclick = ()=>{
  document.body.classList.toggle("light");
};
</script>

</body>
</html>
