<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive App</title>

<style>
body{margin:0;font-family:Arial;background:#121212;color:white;}

.topbar{
  height:60px;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

.right{display:flex;gap:10px;align-items:center;}

.avatar{
  width:35px;height:35px;border-radius:50%;
  overflow:hidden;cursor:pointer;
}

.avatar img{width:100%;height:100%;object-fit:cover;}

.dropdown{
  position:absolute;
  right:10px;
  top:60px;
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
  display:none;
}

.dropdown.show{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e1e1e;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{background:#2a2a2a;}

/* VIEWER */
.viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.viewer.active{display:flex;}

.viewerTop{
  padding:10px;
  background:#1f1f1f;
}

.viewer iframe{
  flex:1;
  border:none;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
<div>Drive App</div>

<div class="right">
<div class="avatar" id="avatar"></div>

<div class="dropdown" id="dropdown">
<div id="email"></div>
<hr>
<div onclick="logout()">🚪 Logout</div>
</div>
</div>
</div>

<!-- FOLDER GRID -->
<div class="grid">

<div class="card" onclick="openFolder('1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT')">📁 EKO PRO</div>
<div class="card" onclick="openFolder('18ASYGXvMTqU2uw57xHF5JZZbLTSvKQTg')">📁 EKO 36</div>
<div class="card" onclick="openFolder('1zXsXINns1ivJOoAnCggsfAjrnSYpUJGW')">📁 EKO 03</div>
<div class="card" onclick="openFolder('1K0SOBV82Lot5pPGTh5iRWBclcR0LMbqv')">📁 CV PROF</div>

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<div class="viewerTop">
<button onclick="closeViewer()">⬅️ Kembali</button>
</div>
<iframe id="frame"></iframe>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const avatar = document.getElementById("avatar");
const dropdown = document.getElementById("dropdown");
const email = document.getElementById("email");

/* AUTH */
onAuthStateChanged(auth,user=>{
  if(user){
    email.innerText = user.email;

    if(user.photoURL){
      avatar.innerHTML = `<img src="${user.photoURL}">`;
    }else{
      avatar.innerText = user.email[0];
    }

  }else{
    location.href="index.html";
  }
});

/* DROPDOWN */
avatar.onclick = ()=> dropdown.classList.toggle("show");

/* LOGOUT */
window.logout = ()=>{
  signOut(auth).then(()=> location.href="index.html");
};

/* OPEN FOLDER (EMBED DRIVE) */
window.openFolder = (id)=>{
  const url = `https://drive.google.com/embeddedfolderview?id=${id}#grid`;

  document.getElementById("viewer").classList.add("active");
  document.getElementById("frame").src = url;
};

window.closeViewer = ()=>{
  document.getElementById("viewer").classList.remove("active");
};
</script>

</body>
</html>
