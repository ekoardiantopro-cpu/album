<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Premium</title>
<style>
*{transition: background 0.3s, color 0.3s;}
body{margin:0;font-family:Arial;background:#121212;color:white;}
.topbar{height:60px;background:#1f1f1f;display:flex;align-items:center;justify-content:space-between;padding:0 15px;}
.search{width:200px;padding:8px;border-radius:8px;border:none;background:#2a2a2a;color:white;}
.user{font-size:12px;color:#aaa;}
.container{padding:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.card{background:#1e1e1e;padding:15px;border-radius:12px;text-align:center;cursor:pointer;}
.hidden{display:none;}
.icon{font-size:40px;}
.viewerPage{position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;display:none;flex-direction:column;}
.viewerPage.active{display:flex;}
.viewerTop{padding:10px;background:#1f1f1f;display:flex;justify-content:space-between;}
iframe{flex:1;border:none;}
.btn{background:#4CAF50;border:none;padding:8px;border-radius:8px;color:white;cursor:pointer;}

/* LIGHT MODE */
body.light{background:#f5f5f5;color:#111;}
body.light .topbar{background:#fff;}
body.light .card{background:#fff;}
body.light .search{background:#eee;color:#000;}
</style>
</head>

<body>

<div class="topbar">
<input class="search" id="search" placeholder="Cari file...">
<div style="display:flex;align-items:center;gap:10px;">
<span id="themeToggle">🌙</span>
<div id="user"></div>
</div>
</div>

<div class="container">
<div class="grid">

<div class="card folder" data-name="eko pro" onclick="openFolder('https://drive.google.com/drive/folders/1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT')">
<div class="icon">📁</div>EKO PRO</div>

<div class="card folder" data-name="eko 36" onclick="openFolder('https://drive.google.com/drive/folders/18ASYGXvMTqU2uw57xHF5JZZbLTSvKQTg')">
<div class="icon">📁</div>EKO 36</div>

<div class="card folder" data-name="eko 03" onclick="openFolder('https://drive.google.com/drive/folders/1zXsXINns1ivJOoAnCggsfAjrnSYpUJGW')">
<div class="icon">📁</div>EKO 03</div>

<div class="card folder" data-name="cv prof" onclick="openFolder('https://drive.google.com/drive/folders/1K0SOBV82Lot5pPGTh5iRWBclcR0LMbqv')">
<div class="icon">📁</div>CV PROF</div>

</div>
</div>

<div class="viewerPage" id="viewerPage">
<div class="viewerTop">
<button class="btn" onclick="closeViewer()">⬅️</button>
<button class="btn" onclick="logout()">Logout</button>
</div>
<iframe id="viewer"></iframe>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,user=>{
if(!user) location.href="index.html";
else document.getElementById("user").innerText=user.email;
});

window.openFolder=url=>window.open(url,"_blank");
window.logout=()=>signOut(auth).then(()=>location.href="index.html");

const toggle=document.getElementById("themeToggle");
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
toggle.innerText="☀️";
}
toggle.onclick=function(){
document.body.classList.toggle("light");
if(document.body.classList.contains("light")){
localStorage.setItem("theme","light");
toggle.innerText="☀️";
}else{
localStorage.setItem("theme","dark");
toggle.innerText="🌙";
}
}
</script>

</body>
</html>
