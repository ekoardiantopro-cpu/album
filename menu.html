<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Premium</title>

<style>
body{margin:0;font-family:Arial;background:#121212;color:white;}
.topbar{height:60px;background:#1f1f1f;display:flex;align-items:center;justify-content:space-between;padding:0 15px;}
.search{padding:8px;border-radius:8px;border:none;background:#2a2a2a;color:white;}
.right{display:flex;align-items:center;gap:10px;}

.theme-btn{cursor:pointer;padding:6px 10px;border-radius:8px;background:#2a2a2a;}

.profile{position:relative;}
.avatar{width:34px;height:34px;border-radius:50%;overflow:hidden;cursor:pointer;}
.avatar img{width:100%;height:100%;object-fit:cover;}

.dropdown{position:absolute;top:45px;right:0;background:#1e1e1e;border-radius:10px;padding:10px;width:200px;display:none;}
.dropdown.show{display:block;}

.container{padding:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}

.card{background:#1e1e1e;padding:15px;border-radius:12px;text-align:center;cursor:pointer;}
.icon{font-size:40px;}

.viewer{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;flex-direction:column;}
.viewer.active{display:flex;}
.viewer iframe{flex:1;border:none;}

.gallery{position:fixed;width:100%;height:100%;top:0;left:0;background:#000;display:none;justify-content:center;align-items:center;}
.gallery.active{display:flex;}
.gallery img{max-width:90%;max-height:90%;}

</style>
</head>

<body>

<div class="topbar">
<input class="search" placeholder="Cari...">

<div class="right">
<span id="themeToggle" class="theme-btn">🌙</span>

<div class="profile">
<div class="avatar" id="avatar"></div>

<div class="dropdown" id="dropdown">
<div id="userEmail"></div>
<hr>
<div onclick="logout()">🚪 Logout</div>
</div>
</div>
</div>
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1AoSKM8CXzb1F5gDYP5a0G0SzZTE2JQDT')">📁 EKO PRO</div>
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/18ASYGXvMTqU2uw57xHF5JZZbLTSvKQTg')">📁 EKO 36</div>
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1zXsXINns1ivJOoAnCggsfAjrnSYpUJGW')">📁 EKO 03</div>
<div class="card" onclick="openFolder('https://drive.google.com/drive/folders/1K0SOBV82Lot5pPGTh5iRWBclcR0LMbqv')">📁 CV PROF</div>

<!-- contoh preview gambar -->
<div class="card" onclick="openImage('https://picsum.photos/800')">🖼️ Sample Image</div>

</div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<button onclick="closeViewer()">⬅️</button>
<iframe id="frame"></iframe>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery" onclick="closeImage()">
<img id="imgView">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyCYmrtHJZoVViIqHGn-frI3AXDL85l4Q-A",
authDomain:"album-ff46e.firebaseapp.com",
projectId:"album-ff46e",
appId:"1:112694935492:web:e5696cae239c50367eee91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const avatar = document.getElementById("avatar");
const dropdown = document.getElementById("dropdown");
const emailBox = document.getElementById("userEmail");

/* LOGIN GOOGLE */
const provider = new GoogleAuthProvider();

if(!auth.currentUser){
signInWithPopup(auth, provider);
}

/* USER */
onAuthStateChanged(auth,user=>{
if(user){
emailBox.innerText = user.email;
avatar.innerHTML = `<img src="${user.photoURL}">`;
}else{
signInWithPopup(auth, provider);
}
});

/* DROPDOWN */
avatar.onclick = ()=>dropdown.classList.toggle("show");

/* LOGOUT */
window.logout = ()=>signOut(auth);

/* FOLDER (EMBED) */
window.openFolder = (url)=>{
document.getElementById("viewer").classList.add("active");
document.getElementById("frame").src = url;
};

window.closeViewer = ()=>{
document.getElementById("viewer").classList.remove("active");
};

/* IMAGE */
window.openImage = (src)=>{
gallery.classList.add("active");
imgView.src = src;
};

window.closeImage = ()=>{
gallery.classList.remove("active");
};

/* THEME */
const toggle = document.getElementById("themeToggle");

toggle.onclick = ()=>{
document.body.classList.toggle("light");
};
</script>

</body>
</html>
