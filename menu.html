<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive PRO</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

.topbar{
  height:60px;
  background:#1f1f1f;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  overflow:hidden;
}

.avatar img{
  width:100%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  background:#2a2a2a;
}

.viewer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:none;
  flex-direction:column;
}

.viewer.active{display:flex;}

.viewerTop{
  background:#1f1f1f;
  padding:10px;
}

.viewer img,.viewer iframe{
  flex:1;
  width:100%;
  border:none;
}

.loginBox{
  display:flex;
  justify-content:center;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="topbar">
  <b>Drive PRO</b>

  <div class="user" id="userBox" style="display:none;">
    <div class="avatar" id="avatar"></div>
    <div id="username"></div>
  </div>
</div>

<div class="loginBox" id="login"></div>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">
  <div class="viewerTop">
    <button onclick="closeViewer()">⬅️ Kembali</button>
  </div>
  <div id="preview"></div>
</div>

<script>

const CLIENT_ID = "PASTE_CLIENT_ID_KAMU";
const API_KEY = "PASTE_API_KEY_KAMU";

let tokenClient;
let accessToken = null;
let currentFolder = "root";
let historyStack = [];

/* INIT GOOGLE */
window.onload = () => {

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleLogin
  });

  google.accounts.id.renderButton(
    document.getElementById("login"),
    { theme: "outline", size: "large" }
  );

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/drive.readonly",
    callback: (resp) => {
      accessToken = resp.access_token;
      loadFolder("root");
    },
  });
};

/* LOGIN */
function handleLogin(response){
  const data = parseJwt(response.credential);

  document.getElementById("userBox").style.display = "flex";
  document.getElementById("username").innerText = data.name;
  document.getElementById("avatar").innerHTML =
    `<img src="${data.picture}">`;

  document.getElementById("login").style.display = "none";

  tokenClient.requestAccessToken();
}

/* JWT PARSE */
function parseJwt (token) {
  return JSON.parse(atob(token.split('.')[1]));
}

/* LOAD FILE */
async function loadFolder(folderId){

  currentFolder = folderId;

  let url;

  if(folderId === "root"){
    url = "https://www.googleapis.com/drive/v3/files?q='root'+in+parents&key="+API_KEY;
  }else{
    url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${API_KEY}`;
  }

  const res = await fetch(url,{
    headers:{
      Authorization: "Bearer "+accessToken
    }
  });

  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.files.forEach(file=>{
    const div = document.createElement("div");
    div.className = "card";

    /* FOLDER */
    if(file.mimeType === "application/vnd.google-apps.folder"){
      div.innerHTML = "📁<br>"+file.name;
      div.onclick = ()=>{
        historyStack.push(currentFolder);
        loadFolder(file.id);
      };
    }

    /* IMAGE */
    else if(file.mimeType.includes("image")){
      div.innerHTML = "🖼️<br>"+file.name;
      div.onclick = ()=> openImage(file.id);
    }

    /* PDF */
    else if(file.mimeType.includes("pdf")){
      div.innerHTML = "📄<br>"+file.name;
      div.onclick = ()=> openPDF(file.id);
    }

    /* OTHER */
    else{
      div.innerHTML = "📄<br>"+file.name;
    }

    grid.appendChild(div);
  });
}

/* PREVIEW */
function openImage(id){
  document.getElementById("viewer").classList.add("active");
  document.getElementById("preview").innerHTML =
  `<img src="https://drive.google.com/uc?id=${id}">`;
}

function openPDF(id){
  document.getElementById("viewer").classList.add("active");
  document.getElementById("preview").innerHTML =
  `<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
}

/* CLOSE */
function closeViewer(){
  document.getElementById("viewer").classList.remove("active");
}

/* BACK */
function goBack(){
  if(historyStack.length > 0){
    loadFolder(historyStack.pop());
  }
}

</script>

</body>
</html>
