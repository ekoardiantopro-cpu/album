<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>
<style>
body{margin:0;background:#121212;color:white;}
iframe{width:100%;height:90vh;border:none;}
.header{padding:10px;background:#1f1f1f;text-align:center;}
.back{position:fixed;bottom:20px;left:20px;background:#4CAF50;padding:10px;border-radius:10px;cursor:pointer;}
</style>
</head>
<body>

<div class="header">📂 File Viewer</div>
<iframe id="frame"></iframe>
<div class="back" onclick="history.back()">⬅️ Kembali</div>

<script>
const urlParams=new URLSearchParams(window.location.search);
const file=urlParams.get("file");
document.getElementById("frame").src=file;
</script>

</body>
</html>
